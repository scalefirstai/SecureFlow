name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Rebuild native modules
        run: npm rebuild better-sqlite3

      - name: Run tests
        run: |
          for pkg in sonarqube-mcp vulntrend-mcp gatekeeper-mcp dep-provenance-mcp security-orchestrator-mcp sbom-registry-mcp reportgen-mcp secureflow-mcp; do
            echo "::group::Testing $pkg"
            cd "packages/$pkg"
            npx vitest run
            cd ../..
            echo "::endgroup::"
          done

  lint:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - run: npm install
      - run: npx tsc -p packages/secureflow-mcp/tsconfig.json --noEmit
